<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>
<style>
body{
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial, sans-serif;
    text-align:center;
    color:white;
    padding-top:100px;
}
h1{
    font-size:50px;
}
.message{
    font-size:24px;
    margin:20px;
}
button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4b6e;
    cursor:pointer;
}
button:hover{
    background:#ffe6ea;
}
</style>
</head>

<body>

<h1>❤️ I Love You ❤️</h1>

<div class="message" id="msg">
Click the button for a surprise 💕
</div>

<button onclick="showLove()">Show Love</button>

<script>
const messages = [
"You are the cutest person in my life 😍",
"You make my world brighter ☀️",
"I feel lucky to have you 💖",
"Your smile is my favorite thing 😊",
"You are my happiness 💕",
"I love you more every day ❤️"
];

function showLove(){
    const random = messages[Math.floor(Math.random()*messages.length)];
    document.getElementById("msg").innerText = random;
}
</script>

</body>
</html>
